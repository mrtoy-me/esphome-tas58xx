substitutions:
  sync_dac_i2s_sound: "https://github.com/mrtoy-me/esphome-tas58xx/raw/beta/components/tas58xx/tas58xx_boot.flac"

  #use instead if you don't want an audible boot sound
  #sync_dac_i2s_sound: "https://github.com/mrtoy-me/esphome-tas58xx/raw/beta/components/tas58xx/silent_boot.flac"

esphome:
  name: louder-esparagus
  friendly_name: Louder Esparagus
  min_version: 2026.2.0
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 220.0
    then:
      media_player.speaker.play_on_device_media_file: startup_sync_sound

esp32:
  variant: esp32
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Optional for ESP32-Louder used by Voice-PE
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5


# Enable logging
logger:
  level: DEBUG
  logs:
    number: INFO

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    # password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

globals:
  - id: current_volume
    type: float
    initial_value: '0.2'
  - id: announcement_triggered
    type: bool
    initial_value: 'false'

psram:
  speed: 80MHz
  ignore_not_found: false

i2c:
  sda: GPIO21
  scl: GPIO27
  frequency: 400kHz
  scan: True

i2s_audio:
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO26

external_components:
  - source: github://mrtoy-me/esphome-tas58xx@beta
    components: [ tas58xx ]
    refresh: 0s

audio_dac:
  - platform: tas58xx
    id: tas58xx_dac
    tas58xx_dac: TAS5825M
    enable_pin: GPIO33
    analog_gain: -15.5db
    dac_mode: BTL
    mixer_mode: STEREO
    volume_max: -1dB
    volume_min: -50db
    #refresh_eq: MANUAL
    update_interval: 1s


speaker:
  - platform: i2s_audio
    id: speaker_id
    dac_type: external
    i2s_dout_pin: GPIO22
    audio_dac: tas58xx_dac
    channel: stereo
    sample_rate: 48000
    timeout: never

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_spk_mixer_input
        timeout: never
      - id: media_spk_mixer_input
        timeout: never

  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input

  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: Mediaplayer
    id: louder_mediaplayer
    buffer_size: 100000
    volume_increment: 10%
    volume_initial: 10%
    media_pipeline:
      speaker: media_spk_resampling_input
      num_channels: 2
    announcement_pipeline:
       speaker: announcement_spk_resampling_input
       num_channels: 1

    files:
      id: startup_sync_sound
      file: ${sync_dac_i2s_sound}

    on_play:
      - if:
          condition:
            switch.is_off: enable_tas58xx
          then:
            switch.turn_on: enable_tas58xx

    on_announcement:
      - if:
          condition:
            switch.is_off: enable_tas58xx
          then:
            switch.turn_on: enable_tas58xx

      - lambda: id(current_volume) = id(tas58xx_dac).volume();

      - mixer_speaker.apply_ducking:
            id: media_spk_mixer_input
            decibel_reduction: 40
            duration: 0.00s
      - wait_until:
            media_player.is_announcing:
      - delay: 0.75s
      - lambda: id(tas58xx_dac).set_volume(id(announce_volume).state / 100);

      - wait_until:
          not:
            media_player.is_announcing:
      - mixer_speaker.apply_ducking:
            id: media_spk_mixer_input
            decibel_reduction: 0
            duration: 1.0s
      - lambda: id(tas58xx_dac).set_volume(id(current_volume));

binary_sensor:
  - platform: tas58xx
    have_fault:
      name: Any Faults
      exclude: CLOCK_FAULT
    left_channel_dc_fault:
      name: Left Channel DC Fault
    right_channel_dc_fault:
      name: Right Channel DC Fault
    left_channel_over_current:
      name: Left Channel Over Current
    right_channel_over_current:
      name: Right Channel Over Current
    otp_crc_check:
      name: CRC Check Fault
    bq_write_failed:
      name: BQ Write Failure
    # I2S clock fault binary sensor is not really useful with speaker media player
    # since it generates clock faults when it manipulates I2S.
    # clock fault:
    #   name: I2S Clock Fault
    pcdd_over_voltage:
      name: PCDD Over Voltage
    pcdd_under_voltage:
      name: PCDD Under Voltage
    over_temp_shutdown:
      name: Over Temperature Shutdown Fault
    over_temp_warning:
      name: Over Temperature Warning
      id: over_temperature_warning

select:
  - platform: tas58xx
    mixer_mode:
      name: _Mixer Mode
    eq_mode:
      name: EQ Mode

switch:
  - platform: tas58xx
    enable_dac:
      name: Enable-Disable
      id: enable_tas58xx
      restore_mode: ALWAYS_ON

sensor:
  - platform: tas58xx
    faults_cleared:
      name: "Times Faults Cleared"

number:
  - platform: template
    name: Announce Volume
    id: announce_volume
    icon: mdi:volume-source
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 50
    optimistic: true

  - platform: tas58xx
    channel_volume_left:
      name: _Volume Left
    channel_volume_right:
      name: _Volume Right

    left_eq_gain_20Hz:
      name: Left ---20Hz
    left_eq_gain_31.5Hz:
      name: Left ---31.5Hz
    left_eq_gain_50Hz:
      name: Left ---50Hz
    left_eq_gain_80Hz:
      name: Left ---80Hz
    left_eq_gain_125Hz:
      name: Left --125Hz
    left_eq_gain_200Hz:
      name: Left --200Hz
    left_eq_gain_315Hz:
      name: Left --315Hz
    left_eq_gain_500Hz:
      name: Left --500Hz
    left_eq_gain_800Hz:
      name: Left --800Hz
    left_eq_gain_1250Hz:
      name: Left -1250Hz
    left_eq_gain_2000Hz:
      name: Left -2000Hz
    left_eq_gain_3150Hz:
      name: Left -3150Hz
    left_eq_gain_5000Hz:
      name: Left -5000Hz
    left_eq_gain_8000Hz:
      name: Left -8000Hz
    left_eq_gain_16000Hz:
      name: Left 16000Hz

    right_eq_gain_20Hz:
      name: Right ---20Hz
    right_eq_gain_31.5Hz:
      name: Right ---31.5Hz
    right_eq_gain_50Hz:
      name: Right ---50Hz
    right_eq_gain_80Hz:
      name: Right ---80Hz
    right_eq_gain_125Hz:
      name: Right --125Hz
    right_eq_gain_200Hz:
      name: Right --200Hz
    right_eq_gain_315Hz:
      name: Right --315Hz
    right_eq_gain_500Hz:
      name: Right --500Hz
    right_eq_gain_800Hz:
      name: Right --800Hz
    right_eq_gain_1250Hz:
      name: Right -1250Hz
    right_eq_gain_2000Hz:
      name: Right -2000Hz
    right_eq_gain_3150Hz:
      name: Right -3150Hz
    right_eq_gain_5000Hz:
      name: Right -5000Hz
    right_eq_gain_8000Hz:
      name: Right -8000Hz
    right_eq_gain_16000Hz:
      name: Right 16000Hz
